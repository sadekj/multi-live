<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Multi Live</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: #111;
      color: #fff;
      font-family: sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    h1 {
      text-align: center;
      margin: 0.5rem;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: row;
      gap: 0.5rem;
      padding: 0.5rem;
      box-sizing: border-box;
      height: 100%;
      width: 100%;
    }

    .video-grid {
      flex: 1;
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      align-content: flex-start;
      height: 100%;
      gap: 0.5rem;
      box-sizing: border-box;
    }

    .iframe-side-container {
      width: 350px;
      height: 100%;
      background-color: #000;
      border-radius: 5px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .iframe-side-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-container {
      aspect-ratio: 1 / 1;
      flex: 0 0 auto;
      height: calc((100% - 2rem) / 3); /* 3 rows max - adjust as needed */
      width: calc((100% - 2rem) / 3);  /* ensures container fills width when rows wrap */
      background-color: #000;
      position: relative;
    }

    iframe {
      position: absolute;
      width: 100%;
      height: 100%;
      border: none;
    }

    .refresh-button {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.5);
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 5px;
      z-index: 1;
      transition: background 0.2s;
    }

    .edit-button {
      position: absolute;
      top: 8px;
      right: 48px;
      background: rgba(0, 0, 0, 0.5);
      border: none;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 5px;
      z-index: 1;
      transition: background 0.2s;
    }

    .refresh-button:hover, .fullscreen-button:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .edit-button:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .fullscreen-button {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.5);
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 4px;
      border-radius: 5px;
      z-index: 1;
      transition: background 0.2s;
      width: 150px;
      height: 30px;
    }

    @media (max-width: 800px) {
      .video-container {
        height: calc((100% - 1rem) / 2);
        width: calc((100% - 1rem) / 2);
      }
    }

    @media (max-width: 500px) {
      .video-container {
        height: calc(100% - 1rem);
        width: calc(100% - 1rem);
      }
    }
  </style>
</head>

  <script>
    function refreshIframe(button) {
      const container = button.parentElement;
      const iframe = container.querySelector("iframe");
      iframe.src = iframe.src;
    }
  </script>
  <script>
    function promptAndUpdateIframe(button) {
      const container = button.parentElement;
      const iframe = container.querySelector("iframe");
      const current = iframe ? iframe.src : '';
      const newSrc = prompt('Enter new iframe src URL:', current);
      if (newSrc === null) return; // user cancelled
      const trimmed = newSrc.trim();
      if (!trimmed) {
        alert('URL cannot be empty.');
        return;
      }
      iframe.src = trimmed;
    }
  </script>
  <div>
  <button class="fullscreen-button" onclick="toggleFullscreen(this)" >
  🖥️ Fullscreen
</button>
</div>
<script type="text/javascript">
  function toggleFullscreen(button) {
  const doc = document.documentElement; // or document.body

  if (!document.fullscreenElement) {
    if (doc.requestFullscreen) {
      doc.requestFullscreen();
    } else if (doc.webkitRequestFullscreen) {
      doc.webkitRequestFullscreen();
    } else if (doc.msRequestFullscreen) {
      doc.msRequestFullscreen();
    }
    button.innerHTML = "X";
  } else {
    if (document.exitFullscreen) {
      document.exitFullscreen();
    } else if (document.webkitExitFullscreen) {
      document.webkitExitFullscreen();
    } else if (document.msExitFullscreen) {
      document.msExitFullscreen();
    }
    button.innerHTML = "🖥️ Fullscreen";
  }
}

</script>
